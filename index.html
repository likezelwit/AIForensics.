<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNO - Premium Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1f1f2e;
      --bg-table: #2d2d44;
      --fg: #ffffff;
      --muted: #8b8b9e;
      --accent: #ff3366;
      --card-width: 90px;
      --card-height: 130px;
      --uno-red: #e63946;
      --uno-blue: #457b9d;
      --uno-green: #2a9d8f;
      --uno-yellow: #e9c46a;
    }

    * { box-sizing: border-box; }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--fg);
      overflow: hidden;
      height: 100vh;
      user-select: none;
      perspective: 1000px;
    }

    /* --- Card Styling --- */
    .uno-card {
      width: var(--card-width);
      height: var(--card-height);
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s, opacity 0.2s, margin 0.3s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid rgba(255,255,255,0.9);
      background: #000;
      transform-style: preserve-3d;
    }

    .uno-card::before {
      content: '';
      position: absolute;
      width: 150%;
      height: 180%;
      background: rgba(255,255,255,0.85);
      border-radius: 50%;
      transform: rotate(-30deg) scale(0.6);
      z-index: 0;
      transition: background 0.3s;
    }

    .card-value {
      position: relative;
      z-index: 2;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem;
      color: #222;
      text-shadow: 2px 2px 0px rgba(255,255,255,0.3);
      line-height: 1;
    }

    .uno-card.red { background: var(--uno-red); }
    .uno-card.blue { background: var(--uno-blue); }
    .uno-card.green { background: var(--uno-green); }
    .uno-card.yellow { background: var(--uno-yellow); }
    
    .uno-card.wild-card {
      background: #111;
      border-color: #333;
    }
    .uno-card.wild-card::before {
        background: linear-gradient(135deg, var(--uno-red) 25%, var(--uno-yellow) 25%, var(--uno-yellow) 50%, var(--uno-green) 50%, var(--uno-green) 75%, var(--uno-blue) 75%);
        transform: rotate(-30deg) scale(0.7);
    }
    .uno-card.wild-card .card-value { color: white; text-shadow: 0 0 10px rgba(255,255,255,0.8); }

    .card-back {
      background: #1a1a1a;
      border: 4px solid #333;
    }
    .card-back::after {
      content: 'UNO';
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      color: var(--uno-red);
      transform: rotate(-20deg);
      border: 3px solid var(--uno-red);
      padding: 4px 12px;
      border-radius: 8px;
      text-shadow: none;
    }
    .card-back::before { display: none; }

    .uno-card:not(.disabled):hover {
      transform: translateY(-40px) scale(1.15) rotateX(10deg);
      z-index: 100;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    .uno-card.disabled {
      filter: brightness(0.5) grayscale(0.8);
      cursor: default;
      transform: scale(0.95);
    }

    .uno-card.playable {
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
      animation: glow-pulse 1.5s infinite alternate;
    }

    @keyframes glow-pulse {
      from { box-shadow: 0 0 5px rgba(255,255,255,0.4); }
      to { box-shadow: 0 0 25px rgba(255,255,255,0.8); }
    }

    /* --- Layout --- */
    #game-app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at center, var(--bg-table) 0%, var(--bg) 100%);
      position: relative;
      overflow: hidden;
    }

    #game-app::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      border: 20px solid rgba(255,255,255,0.03);
      z-index: 0;
    }

    .top-area { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding-top: 20px; z-index: 10; }
    .center-area { height: 250px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; }
    .bottom-area { background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); padding: 20px 10px 30px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 20; }

    /* --- UNO Button --- */
    .uno-btn-container { position: absolute; right: 20px; bottom: 100px; z-index: 50; }

    .big-uno-btn {
      width: 90px; height: 90px; border-radius: 50%;
      background: linear-gradient(135deg, #ff3366 0%, #ff0000 100%);
      border: 4px solid white;
      font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: white;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(255, 0, 0, 0.4);
      transition: all 0.2s;
      opacity: 0.3; pointer-events: none;
    }

    .big-uno-btn.active { opacity: 1; pointer-events: all; animation: shake-btn 0.5s infinite; }
    .big-uno-btn:active { transform: scale(0.9); }

    @keyframes shake-btn {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(-5deg) scale(1.1); }
      50% { transform: rotate(5deg) scale(1.1); }
      100% { transform: rotate(0deg); }
    }

    .hand-wrapper { display: flex; justify-content: center; }
    .hand-container { display: flex; justify-content: center; padding: 10px; }
    .hand-container .uno-card { margin: 0 -20px; }
    .bot-hand .card-back { transform: scale(0.6); margin: 0 -30px !important; }

    /* --- Animations --- */
    @keyframes deal-from-deck { 0% { transform: translate(0, -300px) rotate(180deg) scale(0.5); opacity: 0; } 100% { transform: translate(0, 0) rotate(0) scale(1); opacity: 1; } }
    @keyframes card-played { 0% { transform: translateY(100px) scale(1.2); } 100% { transform: translateY(0) scale(1); } }
    .deal-anim { animation: deal-from-deck 0.4s ease-out backwards; }
    .play-anim { animation: card-played 0.3s ease-out; }

    /* --- Modals --- */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(8px); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .glass-panel { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 2rem; }
    
    .color-btn { width: 80px; height: 80px; border-radius: 50%; border: 4px solid white; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .color-btn:hover { transform: scale(1.2); box-shadow: 0 0 20px currentColor; }
    .color-btn.red { background: var(--uno-red); color: var(--uno-red); }
    .color-btn.blue { background: var(--uno-blue); color: var(--uno-blue); }
    .color-btn.green { background: var(--uno-green); color: var(--uno-green); }
    .color-btn.yellow { background: var(--uno-yellow); color: var(--uno-yellow); }

    .deck-pile { position: relative; width: var(--card-width); height: var(--card-height); margin-right: 40px; }
    .deck-pile .card-back { position: absolute; top: 0; left: 0; cursor: pointer; }
    .deck-pile .card-back:nth-child(1) { transform: translate(2px, 2px); }
    .deck-pile .card-back:nth-child(2) { transform: translate(4px, 4px); }
    
    .discard-pile { width: var(--card-width); height: var(--card-height); background: rgba(0,0,0,0.2); border-radius: 12px; border: 2px dashed rgba(255,255,255,0.2); }
    .turn-indicator { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: var(--accent); padding: 8px 24px; border-radius: 30px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
  </style>
</head>
<body>

  <!-- LOBBY SCREEN -->
  <div id="lobby" class="min-h-screen flex flex-col items-center justify-center p-4">
    <div class="text-center mb-12">
      <h1 class="font-display text-9xl tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-yellow-500 drop-shadow-lg">UNO</h1>
      <p class="text-gray-400 tracking-widest uppercase mt-2">Premium Browser Edition</p>
    </div>

    <div class="w-full max-w-md space-y-6">
      <div class="glass-panel p-6">
        <label class="block text-xs text-gray-300 uppercase tracking-wider mb-2">Enter Your Name</label>
        <input type="text" id="player-name" value="Player" class="w-full bg-black/20 border border-white/20 rounded-xl px-4 py-3 text-white text-lg outline-none focus:border-red-500 transition-colors">
      </div>

      <div class="glass-panel p-6 flex items-center justify-between">
        <div>
            <span class="block font-bold text-lg">Bot Count</span>
            <span class="text-xs text-gray-400">Difficulty adapts to count</span>
        </div>
        <div class="flex items-center gap-4 bg-black/20 rounded-full p-2">
          <button id="btn-bot-minus" class="w-10 h-10 rounded-full bg-red-900/50 text-xl hover:bg-red-800 transition">-</button>
          <span id="bot-count" class="text-3xl font-bold w-8 text-center">3</span>
          <button id="btn-bot-plus" class="w-10 h-10 rounded-full bg-green-900/50 text-xl hover:bg-green-800 transition">+</button>
        </div>
      </div>

      <button id="btn-start" class="w-full py-5 bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500 hover:to-red-400 rounded-xl font-bold text-2xl tracking-wide transition-all hover:scale-105 shadow-2xl shadow-red-900/50 text-white">
        START GAME
      </button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-app" class="hidden">
    <div id="turn-indicator" class="turn-indicator">Waiting...</div>
    <div id="bot-area" class="top-area"></div>

    <div class="center-area">
      <div class="deck-pile" id="draw-pile" title="Draw Card (D)">
        <div class="uno-card card-back"></div>
        <div class="uno-card card-back"></div>
        <div class="uno-card card-back"></div>
      </div>
      <div class="discard-pile" id="discard-pile"></div>
      <div id="color-orb" class="absolute -bottom-10 left-1/2 transform -translate-x-1/2 w-10 h-10 rounded-full border-4 border-white/50 shadow-lg transition-colors duration-300"></div>
    </div>

    <div class="bottom-area">
      <div class="flex justify-between items-center mb-2 px-6 max-w-5xl mx-auto w-full">
        <div class="flex items-center gap-2">
            <span id="player-name-display" class="font-bold text-xl"></span>
            <span id="player-card-count" class="text-sm bg-white/20 px-2 py-1 rounded-full">0 cards</span>
        </div>
      </div>
      <div class="hand-wrapper overflow-x-auto pb-4">
        <div id="player-hand" class="hand-container"></div>
      </div>
    </div>

    <div class="uno-btn-container">
      <button id="uno-btn" class="big-uno-btn" title="Say UNO (U)">UNO</button>
    </div>
  </div>

  <!-- COLOR PICKER MODAL -->
  <div id="color-picker" class="modal-overlay">
    <div class="glass-panel p-10 flex flex-col items-center gap-6 text-center">
      <h3 class="text-2xl font-bold">Choose a Color</h3>
      <div class="flex gap-6">
        <button class="color-btn red" data-color="red"></button>
        <button class="color-btn blue" data-color="blue"></button>
        <button class="color-btn green" data-color="green"></button>
        <button class="color-btn yellow" data-color="yellow"></button>
      </div>
    </div>
  </div>

  <!-- GAME OVER MODAL -->
  <div id="game-over" class="modal-overlay">
    <div class="glass-panel p-10 flex flex-col items-center gap-6 text-center">
      <h2 id="winner-text" class="text-5xl font-bold text-white">YOU WIN!</h2>
      <p id="win-subtitle" class="text-gray-300">Congratulations!</p>
      <div class="flex gap-4 mt-4">
        <button id="btn-restart" class="px-8 py-3 bg-green-600 rounded-lg font-bold text-white hover:bg-green-500 transition">Play Again</button>
        <button id="btn-lobby" class="px-8 py-3 bg-gray-700 rounded-lg font-bold text-white hover:bg-gray-600 transition">Lobby</button>
      </div>
    </div>
  </div>

  <script>
    // ==========================
    // --- CONFIG & CONSTANTS ---
    // ==========================
    const COLORS = ['red', 'blue', 'green', 'yellow'];
    const SPECIAL_VALUES = ['S', 'R', '+2']; // Skip, Reverse, Draw Two
    const WILD_VALUES = ['W', '+4']; // Wild, Wild Draw Four
    
    // ==========================
    // --- AUDIO SYSTEM ---
    // ==========================
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
    function playSound(type) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      const t = audioCtx.currentTime;
      
      // Simple sound synthesis based on type
      const sounds = {
        card: { type: 'triangle', freq: [400, 200], dur: 0.1, vol: 0.1 },
        win: { type: 'sine', freq: [523.25, 659.25], dur: 0.5, vol: 0.1 },
        lose: { type: 'sawtooth', freq: [200, 50], dur: 0.5, vol: 0.1 },
        draw: { type: 'sine', freq: [300, 300], dur: 0.05, vol: 0.05 }
      };
      
      const s = sounds[type];
      if(!s) return;

      osc.type = s.type;
      osc.frequency.setValueAtTime(s.freq[0], t);
      if(s.freq[0] !== s.freq[1]) osc.frequency.exponentialRampToValueAtTime(s.freq[1], t + s.dur);
      
      g.gain.setValueAtTime(s.vol, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + s.dur);
      
      osc.start(t);
      osc.stop(t + s.dur);
    }

    // ==========================
    // --- GAME STATE ---
    // ==========================
    let state = {
      deck: [], 
      discard: [], 
      players: [], 
      turn: 0,          // Index of current player
      dir: 1,           // 1 = Clockwise, -1 = Counter-Clockwise
      activeColor: 'red',
      isOver: false, 
      active: false,    // Is game running?
      saidUno: false,   // Did player press UNO button?
      pendingWild: null // Stores card if waiting for color choice
    };

    // DOM References
    const $ = id => document.getElementById(id);
    const UI = {
      lobby: $('lobby'), game: $('game-app'), hand: $('player-hand'),
      botArea: $('bot-area'), discard: $('discard-pile'), draw: $('draw-pile'),
      colorPicker: $('color-picker'), gameOver: $('game-over'),
      unoBtn: $('uno-btn'), turnInd: $('turn-indicator'), colorOrb: $('color-orb'),
      botCount: $('bot-count'), playerName: $('player-name')
    };

    // ==========================
    // --- DECK & UTILITIES ---
    // ==========================
    function createDeck() {
      let d = [];
      // Number cards and action cards per color
      COLORS.forEach(c => {
        d.push({ c, v: '0' }); // One 0
        for (let i=1; i<=9; i++) { // Two of each 1-9
            d.push({c, v: i.toString()}); 
            d.push({c, v: i.toString()}); 
        }
        SPECIAL_VALUES.forEach(v => { d.push({c, v}); d.push({c, v}); }); // Two of each special
      });
      // Wild cards
      for(let i=0; i<4; i++) { 
          d.push({c: 'black', v: 'W'}); 
          d.push({c: 'black', v: '+4'}); 
      }
      return shuffle(d);
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ==========================
    // --- RENDERING ---
    // ==========================
    function renderCard(card, isBack=false) {
      const el = document.createElement('div');
      el.className = `uno-card ${isBack ? 'card-back' : card.c} ${card.c === 'black' ? 'wild-card' : ''}`;
      
      let sym = card.v;
      if (sym === 'S') sym = 'Ø'; 
      if (sym === 'R') sym = '⟲'; 
      
      if (!isBack) el.innerHTML = `<span class="card-value">${sym}</span>`;
      return el;
    }

    function updateUI() {
      // Discard Pile
      const top = state.discard[state.discard.length - 1];
      if (top) {
        UI.discard.innerHTML = '';
        const cardEl = renderCard(top);
        cardEl.classList.add('play-anim');
        UI.discard.appendChild(cardEl);
      }
      
      // Color Orb
      const cmap = { red: 'var(--uno-red)', blue: 'var(--uno-blue)', green: 'var(--uno-green)', yellow: 'var(--uno-yellow)' };
      UI.colorOrb.style.background = cmap[state.activeColor] || 'transparent';

      // Turn Indicator
      const currPlayer = state.players[state.turn];
      UI.turnInd.innerText = state.turn === 0 ? "Your Turn" : `${currPlayer.name}'s Turn`;
      UI.turnInd.style.background = state.turn === 0 ? 'var(--accent)' : 'rgba(255,255,255,0.2)';

      // UNO Button Logic
      // Active if it's player's turn, they have 2 cards, and haven't said UNO yet
      if (state.turn === 0 && state.players[0].hand.length === 2 && !state.saidUno && state.active) {
        UI.unoBtn.classList.add('active');
      } else {
        UI.unoBtn.classList.remove('active');
      }
      
      $('player-card-count').innerText = `${state.players[0].hand.length} cards`;
    }

    function renderHand() {
      UI.hand.innerHTML = '';
      const me = state.players[0];
      const isMyTurn = state.turn === 0;

      me.hand.forEach((card, idx) => {
        const el = renderCard(card);
        // Animation logic could go here
        
        const valid = isMyTurn && checkValidPlay(card);
        if (valid) el.classList.add('playable');
        else el.classList.add('disabled');

        el.onclick = () => {
          if (valid) executePlayerTurn(idx);
        };
        UI.hand.appendChild(el);
      });
    }

    function renderBots() {
      UI.botArea.innerHTML = '';
      state.players.slice(1).forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'flex flex-col items-center';
        
        const tag = document.createElement('div');
        const isTurn = state.turn === (i + 1);
        tag.className = `text-xs font-bold px-3 py-1 rounded-full mb-2 ${isTurn ? 'bg-white text-black' : 'bg-black/20 text-gray-400'}`;
        tag.innerText = p.name;
        
        const handDiv = document.createElement('div');
        handDiv.className = 'bot-hand flex';
        // Show placeholder cards
        p.hand.slice(0, 5).forEach(() => {
           handDiv.innerHTML += `<div class="uno-card card-back"></div>`;
        });
        
        const count = document.createElement('span');
        count.className = 'text-xs text-gray-500 mt-1';
        count.innerText = `${p.hand.length} cards`;
        
        div.appendChild(tag);
        div.appendChild(handDiv);
        div.appendChild(count);
        UI.botArea.appendChild(div);
      });
    }

    // ==========================
    // --- GAME LOGIC ---
    // ==========================
    
    // Check if a card can be played
    function checkValidPlay(card) {
      const top = state.discard[state.discard.length - 1];
      if (!top) return true;
      
      // Wild cards are always valid
      if (card.c === 'black') return true;
      
      // Match color or value
      if (card.c === state.activeColor) return true;
      if (card.v === top.v) return true;
      
      return false;
    }

    // Draw cards from deck
    function drawCards(count=1) {
      let drawn = [];
      for(let i=0; i<count; i++) {
        // Reshuffle if deck empty
        if (state.deck.length === 0) {
            if(state.discard.length <= 1) break; // No cards to reshuffle
            const topCard = state.discard.pop();
            state.deck = shuffle(state.discard);
            state.discard = [topCard];
        }
        if(state.deck.length > 0) drawn.push(state.deck.pop());
      }
      return drawn;
    }

    // Handle playing a card
    function playCard(pIdx, cIdx) {
      const player = state.players[pIdx];
      const card = player.hand.splice(cIdx, 1)[0];
      state.discard.push(card);
      
      playSound('card');

      // Check Win
      if (player.hand.length === 0) {
        setTimeout(() => endGame(pIdx), 500);
        updateUI();
        renderHand();
        return;
      }

      // UNO Check (Player only)
      if (pIdx === 0 && player.hand.length === 1 && !state.saidUno) {
         setTimeout(() => {
             alert("You forgot to say UNO! Draw 2 cards.");
             player.hand.push(...drawCards(2));
             renderHand();
             updateUI();
         }, 300);
      }
      
      // Bot Auto-UNO
      if (pIdx !== 0 && player.hand.length === 1) {
          console.log(`${player.name} says UNO!`);
      }

      // Handle Wildcards
      if (card.c === 'black') {
        if (pIdx === 0) {
          state.pendingWild = card;
          UI.colorPicker.classList.add('active');
          updateUI();
          return; // Pause game flow until color chosen
        } else {
          state.activeColor = chooseBotColor(player.hand);
        }
      } else {
        state.activeColor = card.c;
      }

      applyCardEffect(card, pIdx);
      advanceTurn();
    }

    // Apply effects (Skip, Reverse, +2, +4)
    function applyCardEffect(card, currentPIdx) {
        switch(card.v) {
            case 'S': // Skip
                // Logic handled in advanceTurn, just visual/logic consistency
                // We skip the NEXT player. 
                // Implementation: Move turn index once, then advanceTurn moves it again.
                state.turn = getNextPlayerIdx(); 
                break;
            case 'R': // Reverse
                state.dir *= -1;
                // In 2 player game, Reverse acts like Skip
                if (state.players.length === 2) state.turn = getNextPlayerIdx();
                break;
            case '+2':
                const victimIdx2 = getNextPlayerIdx();
                state.players[victimIdx2].hand.push(...drawCards(2));
                state.turn = victimIdx2; // Skip the victim
                break;
            case '+4':
                const victimIdx4 = getNextPlayerIdx();
                state.players[victimIdx4].hand.push(...drawCards(4));
                state.turn = victimIdx4; // Skip the victim
                break;
        }
    }

    function getNextPlayerIdx() {
      let next = state.turn + state.dir;
      if (next >= state.players.length) next = 0;
      if (next < 0) next = state.players.length - 1;
      return next;
    }

    function advanceTurn() {
      state.turn = getNextPlayerIdx();
      state.saidUno = false; // Reset UNO flag for the new player
      
      updateUI();
      renderHand();
      renderBots();
      
      // Check if bot needs to play
      if (state.players[state.turn].isBot) {
        setTimeout(botTurn, 1200);
      }
    }

    // ==========================
    // --- BOT AI ---
    // ==========================
    function botTurn() {
      if (state.isOver || !state.active) return;
      
      const p = state.players[state.turn];
      let validMoves = [];

      // Find valid moves
      p.hand.forEach((card, index) => {
          if(checkValidPlay(card)) validMoves.push({card, index});
      });

      if (validMoves.length > 0) {
          // Simple Strategy: Prioritize +4, then +2, then Skip/Rev, then color match, then wild
          validMoves.sort((a, b) => getCardPriority(b.card) - getCardPriority(a.card));
          
          // If best card is +4 but we have other options, maybe hold it (chance logic)
          // Simplified: Just play best card
          const choice = validMoves[0];
          playCard(state.turn, choice.index);
      } else {
          // Must draw
          const drawn = drawCards(1);
          if(drawn.length > 0) p.hand.push(...drawn);
          playSound('draw');
          
          // Check if drawn card is playable
          const drawnCard = drawn[0];
          if(drawnCard && checkValidPlay(drawnCard)) {
              // Play it immediately
              const idx = p.hand.length - 1;
              setTimeout(() => playCard(state.turn, idx), 800);
          } else {
              advanceTurn();
          }
      }
    }

    function getCardPriority(card) {
        if(card.v === '+4') return 100;
        if(card.v === '+2') return 80;
        if(card.v === 'S' || card.v === 'R') return 50;
        if(card.c !== 'black') return 20; // Color cards
        return 10; // Wild
    }

    function chooseBotColor(hand) {
        let counts = { red: 0, blue: 0, green: 0, yellow: 0 };
        hand.forEach(c => { if (c.c !== 'black') counts[c.c]++; });
        // Return color with most cards
        return Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
    }

    // ==========================
    // --- INITIALIZATION ---
    // ==========================
    async function startGame() {
      initAudio();
      
      const botCount = parseInt(UI.botCount.innerText.trim(), 10) || 3; 
      const pName = UI.playerName.value || 'Player';
      
      state = {
        deck: createDeck(), discard: [], 
        players: [{name: pName, hand: [], isBot: false}],
        turn: 0, dir: 1, isOver: false, active: true, saidUno: false, pendingWild: null
      };
      
      for(let i=0; i<botCount; i++) {
          state.players.push({name: `Bot ${i+1}`, hand: [], isBot: true});
      }

      UI.lobby.classList.add('hidden');
      UI.game.classList.remove('hidden');
      $('player-name-display').innerText = pName;

      // Deal Cards Animation
      for(let i=0; i<7; i++) {
        for(let p of state.players) {
          p.hand.push(drawCards()[0]);
          playSound('draw');
          await sleep(80);
          renderHand(); renderBots(); updateUI();
        }
      }

      // Start Discard Pile (must not be wild or special if possible, standard rules vary)
      // Simplified: Just find a number card to start
      let startCard = drawCards()[0];
      while(startCard.c === 'black' || SPECIAL_VALUES.includes(startCard.v)) {
        state.deck.unshift(startCard); // Put back on bottom
        state.deck = shuffle(state.deck); // Shuffle
        startCard = drawCards()[0];
      }
      state.discard.push(startCard);
      state.activeColor = startCard.c;
      
      playSound('card');
      updateUI();
      renderHand(); 
    }

    function endGame(winner) {
      state.isOver = false;
      state.active = false;
      
      const txt = winner === 0 ? 'VICTORY!' : 'GAME OVER';
      const sub = winner === 0 ? 'You played all your cards!' : `${state.players[winner].name} wins.`;
      $('winner-text').innerText = txt;
      $('win-subtitle').innerText = sub;
      UI.gameOver.classList.add('active');
      if(winner === 0) playSound('win'); else playSound('lose');
    }

    function executePlayerTurn(cardIndex) {
        if (state.turn !== 0 || state.isOver || !state.active) return;
        playCard(0, cardIndex);
    }

    // --- Event Listeners ---
    document.addEventListener('DOMContentLoaded', () => {
        $('btn-start').addEventListener('click', startGame);

        $('btn-restart').addEventListener('click', () => {
            UI.gameOver.classList.remove('active'); 
            startGame();
        });
        
        $('btn-lobby').addEventListener('click', () => {
            UI.game.classList.add('hidden'); 
            UI.lobby.classList.remove('hidden'); 
            UI.gameOver.classList.remove('active');
        });

        $('btn-bot-plus').addEventListener('click', () => {
            let v = parseInt(UI.botCount.innerText);
            if(v < 5) UI.botCount.innerText = v+1;
        });
        
        $('btn-bot-minus').addEventListener('click', () => {
            let v = parseInt(UI.botCount.innerText);
            if(v > 1) UI.botCount.innerText = v-1;
        });

        UI.draw.addEventListener('click', () => {
          if (state.turn !== 0 || state.isOver || !state.active) return;
          state.players[0].hand.push(...drawCards(1));
          playSound('draw');
          
          // Basic rule: If you draw, you can play if valid, else pass. 
          // Here we auto-pass for simplicity, or allow playing if valid.
          // Let's render hand so they can play the drawn card if valid.
          renderHand();
          updateUI();
          
          // Check if drawn card is playable
          const drawnCard = state.players[0].hand[state.players[0].hand.length - 1];
          if(!checkValidPlay(drawnCard)) {
              advanceTurn(); // Auto pass if drawn card isn't playable
          }
        });

        UI.unoBtn.addEventListener('click', () => {
          state.saidUno = true;
          UI.unoBtn.classList.remove('active');
          UI.unoBtn.style.background = '#2a9d8f'; 
          setTimeout(() => UI.unoBtn.style.background = '', 300);
        });

        document.querySelectorAll('.color-btn').forEach(b => {
          b.addEventListener('click', () => {
            if(!state.pendingWild) return;
            
            state.activeColor = b.dataset.color;
            UI.colorPicker.classList.remove('active');
            
            // Apply effect of the pending wild card
            applyCardEffect(state.pendingWild, 0);
            state.pendingWild = null;
            
            advanceTurn();
          });
        });
    });

    document.addEventListener('keydown', e => {
      if (state.isOver || !state.active) return;
      if (e.key === 'u' || e.key === 'U') UI.unoBtn.click();
      if (e.key === 'd' || e.key === 'D') UI.draw.click();
    });

  </script>
</body>
