<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f8f9fa">
  <meta name="mobile-web-app-capable" content="yes">
  <title>UNO - Card Game</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🃏</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- SVG Definitions -->
  <svg width="0" height="0" style="position:absolute; visibility:hidden;">
    <defs>
      <linearGradient id="unoRed" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#FF5252"/>
        <stop offset="100%" stop-color="#D32F2F"/>
      </linearGradient>
      <linearGradient id="unoBlue" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#448AFF"/>
        <stop offset="100%" stop-color="#2962FF"/>
      </linearGradient>
      <linearGradient id="unoGreen" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#69F0AE"/>
        <stop offset="100%" stop-color="#00C853"/>
      </linearGradient>
      <linearGradient id="unoYellow" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#FFFF00"/>
        <stop offset="100%" stop-color="#FFD600"/>
      </linearGradient>
    </defs>
  </svg>

  <!-- Background -->
  <div class="game-bg"></div>
  <div class="particles" id="particles"></div>
  <div class="confetti-container" id="confetti-container"></div>
  <div id="game-message" class="game-message glass-panel" style="display: none;"></div>

  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-logo">UNO</div>
    <div class="loading-cards">
      <div class="loading-card"><svg viewBox="0 0 240 360"><rect width="240" height="360" rx="25" fill="url(#unoRed)"/></svg></div>
      <div class="loading-card"><svg viewBox="0 0 240 360"><rect width="240" height="360" rx="25" fill="url(#unoBlue)"/></svg></div>
      <div class="loading-card"><svg viewBox="0 0 240 360"><rect width="240" height="360" rx="25" fill="url(#unoGreen)"/></svg></div>
      <div class="loading-card"><svg viewBox="0 0 240 360"><rect width="240" height="360" rx="25" fill="url(#unoYellow)"/></svg></div>
    </div>
    <div class="loading-bar-container">
      <div class="loading-bar" id="loading-bar" style="width: 0%"></div>
    </div>
    <div class="loading-text" id="loading-text">Loading...</div>
  </div>

  <!-- Main Menu -->
  <div id="menu-screen" class="menu-screen screen">
    <div class="menu-header">
      <h1 class="menu-logo">UNO</h1>
      <p class="menu-subtitle">Card Game</p>
    </div>

    <div class="player-bar glass-panel">
      <div class="player-bar-avatar">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
      </div>
      <div class="player-bar-info">
        <div class="player-bar-name">Player</div>
        <div class="player-bar-level">Level 12</div>
      </div>
    </div>

    <p class="text-xs font-bold mb-2 theme-label">SELECT GAME MODE</p>
    
    <div class="theme-cards-container" id="theme-cards">
      <div class="theme-card glass-panel selected" data-mode="solo" style="background: linear-gradient(145deg, #ff4757, #c0392b);">
        <div class="theme-card-content">
          <div class="theme-card-icon">🃏</div>
          <div class="theme-card-title">Classic<br>Mode</div>
        </div>
      </div>
      <div class="theme-card glass-panel" data-mode="team" style="background: linear-gradient(145deg, #3742fa, #2832c2);">
        <div class="theme-card-content">
          <div class="theme-card-icon">🤝</div>
          <div class="theme-card-title">Team<br>Mode</div>
        </div>
      </div>
    </div>

    <div class="menu-bottom">
      <button class="menu-btn primary" onclick="enterMatchmaking()">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        Play
      </button>
    </div>
  </div>

  <!-- Matchmaking Room -->
  <div id="matchmaking-room" class="matchmaking-room screen">
    <h2 class="matchmaking-title">Finding Players</h2>
    <div class="matchmaking-grid" id="matchmaking-grid">
      <!-- Slots generated by JS -->
    </div>
    <button id="start-match-btn" class="start-match-btn" disabled onclick="startMatch()">START MATCH</button>
    <button class="menu-btn secondary glass-panel mt-3" onclick="cancelMatchmaking()">Cancel</button>
  </div>

  <!-- Game App -->
  <div id="game-app" class="screen">
    <div class="top-bar">
      <div class="game-timer glass-panel" id="game-timer-display">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
        <span id="game-timer">3:00</span>
      </div>
    </div>

    <div id="turn-indicator" class="turn-indicator glass-panel" style="display: none;">
      <span id="turn-text">Your Turn</span>
    </div>

    <div class="game-table" id="game-table">
      <div class="table-surface"></div>
      
      <!-- Direction Indicator -->
      <div class="direction-ring" id="direction-ring">
        <div class="direction-arc clockwise active" id="direction-arc">
           <svg viewBox="0 0 200 200">
             <path d="M100 25 A75 75 0 1 1 35 130" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="6" stroke-linecap="round"/>
           </svg>
        </div>
      </div>

      <div class="center-area" id="center-area">
        <div class="discard-pile" id="discard-pile"></div>
        <div class="color-indicator" id="color-indicator"></div>
      </div>
      
      <!-- Player Zones will be injected here by JS -->
    </div>

    <div class="draw-pile-container" id="draw-pile-container">
      <div class="deck-pile" id="draw-pile">
        <div class="deck-count" id="deck-count">52</div>
      </div>
    </div>

    <div class="uno-btn-wrap" id="uno-btn-wrap">
      <button id="uno-btn" class="big-uno-btn">UNO</button>
    </div>

    <!-- Draw Choice Modal (Keep or Play) -->
    <div id="draw-choice-modal" class="modal-overlay">
      <div class="glass-panel modal-content p-4">
        <h3 class="text-lg font-bold mb-3 text-center">Play Drawn Card?</h3>
        <div id="drawn-card-preview" class="flex justify-center mb-4"></div>
        <div class="flex gap-3">
          <button id="btn-keep" class="menu-btn secondary flex-1">Keep</button>
          <button id="btn-play-drawn" class="menu-btn primary flex-1">Play</button>
        </div>
      </div>
    </div>

    <div id="color-picker-3d" class="color-picker-3d">
      <div class="color-box-3d red glass-panel" data-color="red"></div>
      <div class="color-box-3d blue glass-panel" data-color="blue"></div>
      <div class="color-box-3d green glass-panel" data-color="green"></div>
      <div class="color-box-3d yellow glass-panel" data-color="yellow"></div>
    </div>
  </div>

  <!-- Game Over Modal -->
  <div id="game-over" class="modal-overlay">
    <div class="glass-panel modal-content p-6 flex flex-col items-center gap-4 text-center">
      <div class="text-5xl" id="result-emoji"></div>
      <h2 id="winner-text" class="text-xl font-extrabold modal-title">GAME OVER</h2>
      <div class="w-full max-w-xs" id="results-container"></div>
      <div class="flex gap-3 mt-3 flex-wrap justify-center">
        <button id="btn-restart" class="menu-btn primary">Rematch</button>
        <button id="btn-lobby" class="menu-btn secondary glass-panel">Menu</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
